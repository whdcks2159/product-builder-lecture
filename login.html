<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 — LottoGen</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

    <!-- ── 상단 유틸 바 ── -->
    <div class="util-bar">
        <div class="util-inner">
            <ul class="util-links">
                <li id="util-login"><a href="login.html">로그인</a></li>
                <li id="util-signup"><a href="signup.html">회원가입</a></li>
                <li id="util-user-info" style="display:none">
                    <span id="util-username"></span>
                    <span class="util-sep">|</span>
                    <button id="util-logout-btn" class="util-logout-btn">로그아웃</button>
                </li>
                <li><a href="#">고객센터</a></li>
                <li><a href="#">사이트맵</a></li>
            </ul>
            <button id="theme-toggle" aria-label="다크/라이트 모드 전환">🌙</button>
        </div>
    </div>

    <!-- ── 헤더 ── -->
    <header class="site-header">
        <div class="header-inner">
            <a href="index.html" class="logo">LOTTO<span>GEN</span></a>
            <nav class="main-nav">
                <ul>
                    <li><a href="index.html#lotto-section">번호생성</a></li>
                    <li><a href="index.html#disqus-section">커뮤니티</a></li>
                    <li><a href="index.html#contact-section">제휴문의</a></li>
                    <li><a href="#">당첨결과</a></li>
                    <li><a href="#">이용안내</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- ── 로그인 카드 ── -->
    <main class="auth-main">
        <div class="auth-card">
            <h1 class="auth-title">로그인</h1>
            <p class="auth-sub">LottoGen 계정으로 로그인하세요</p>

            <form id="login-form" novalidate>
                <div class="form-group">
                    <label for="login-email">이메일 <span class="required">*</span></label>
                    <input type="email" id="login-email" name="email"
                           placeholder="example@email.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="login-password">비밀번호 <span class="required">*</span></label>
                    <input type="password" id="login-password" name="password"
                           placeholder="비밀번호 입력" required autocomplete="current-password">
                </div>

                <p id="login-error" class="auth-error" aria-live="polite"></p>

                <button type="submit" class="submit-btn auth-submit-btn" id="login-btn">
                    로그인
                </button>
            </form>

            <p class="auth-footer-link">
                아직 계정이 없으신가요?
                <a href="signup.html">회원가입</a>
            </p>
        </div>
    </main>

    <!-- ── 푸터 ── -->
    <footer class="site-footer">
        <div class="footer-inner">
            <div class="footer-top">
                <span class="footer-logo">LOTTOGEN</span>
                <ul class="footer-links">
                    <li><a href="#">이용약관</a></li>
                    <li><a href="#">개인정보처리방침</a></li>
                    <li><a href="#">고객센터</a></li>
                    <li><a href="index.html#contact-section">제휴문의</a></li>
                </ul>
            </div>
            <p class="footer-copy">© 2026 LottoGen. All rights reserved.</p>
        </div>
    </footer>

    <!-- ── Firebase SDKs ── -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="auth.js"></script>

    <script>
        // 이미 로그인된 경우 index로 이동
        auth.onAuthStateChanged(function(user) {
            if (user) {
                window.location.href = 'index.html';
            }
        });

        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const email    = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            const errorEl  = document.getElementById('login-error');
            const btn      = document.getElementById('login-btn');

            errorEl.textContent = '';
            btn.disabled = true;
            btn.textContent = '로그인 중...';

            handleLogin(email, password)
                .then(function() {
                    window.location.href = 'index.html';
                })
                .catch(function(err) {
                    errorEl.textContent = getAuthErrorMessage(err.code);
                    btn.disabled = false;
                    btn.textContent = '로그인';
                });
        });

        // 다크모드 토글 (index.html과 동일)
        (function() {
            const stored = localStorage.getItem('theme');
            if (stored === 'dark') document.body.classList.add('dark');
            const btn = document.getElementById('theme-toggle');
            if (btn) {
                btn.textContent = document.body.classList.contains('dark') ? '☀️' : '🌙';
                btn.addEventListener('click', function() {
                    document.body.classList.toggle('dark');
                    const isDark = document.body.classList.contains('dark');
                    localStorage.setItem('theme', isDark ? 'dark' : 'light');
                    btn.textContent = isDark ? '☀️' : '🌙';
                });
            }
        })();

        function getAuthErrorMessage(code) {
            const messages = {
                'auth/invalid-email':      '유효하지 않은 이메일 형식입니다.',
                'auth/user-not-found':     '등록되지 않은 이메일입니다.',
                'auth/wrong-password':     '비밀번호가 올바르지 않습니다.',
                'auth/too-many-requests':  '로그인 시도가 너무 많습니다. 잠시 후 다시 시도해주세요.',
                'auth/invalid-credential': '이메일 또는 비밀번호가 올바르지 않습니다.',
            };
            return messages[code] || '로그인 중 오류가 발생했습니다. 다시 시도해주세요.';
        }
    </script>
</body>
</html>
